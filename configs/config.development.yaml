app:
  name: Velocity
  environment: development
  version: "0.1.0"

server:
  host: localhost
  port: 3000
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s
  shutdown_timeout: 10s

database:
  host: localhost
  port: 5432
  user: postgres
  password: Shinas
  name: velocity
  ssl_mode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 30m

logger:
  level: debug
  encoding: json
  development: true

engine:
  queue_size: 10000
  worker_count: 4
  snapshot_interval: 1000
  persistence_buffer: 1000
  recovery_enabled: true

jwt:
  secret: "super-secret-key"
  issuer: "velocity"
  expiry: 24h

websocket:
  read_buffer_size: 1024
  write_buffer_size: 1024
  max_connections: 10000

metrics:
  enabled: true
  host: localhost
  port: 9090
  path: /metrics

redis:
  host: localhost
  port: 6379
  password: ""
  database: 0

kafka:
  brokers:
    - localhost:9092
  topic: velocity-events
  group_id: velocity-group

tracing:
  enabled: false
  exporter: jaeger
  endpoint: http://localhost:14268/api/traces