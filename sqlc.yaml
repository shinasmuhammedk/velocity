version: "2"

sql:
  - engine: "postgresql"

    schema:
      - "migrations"

    queries:
      - "internal/persistence/postgres/queries"

    gen:
      go:
        package: "generated"
        out: "internal/persistence/postgres/generated"

        sql_package: "pgx/v5"

        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true